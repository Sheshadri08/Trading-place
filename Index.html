<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trading Place</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔥 NAVBAR -->
<div class="navbar">
  <h2>🛒 Trading Place</h2>

  <input type="text" id="search" placeholder="Search for luxury items...">

  <div>
    <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
  </div>
</div>

<!-- 🎯 HERO SECTION -->
<div class="hero">
  <h1>Welcome to Trading Place</h1>
  <p>Luxury. Premium. Exclusive.</p>
</div>

<!-- 🧭 CATEGORY FILTER -->
<div class="categories">
  <button onclick="filterCategory('All')">All</button>
  <button onclick="filterCategory('Luxury')">Luxury</button>
  <button onclick="filterCategory('Premium')">Premium</button>
  <button onclick="filterCategory('Exclusive')">Exclusive</button>
</div>

<!-- 🛍️ PRODUCTS -->
<div id="products"></div>

<!-- ⚙️ SCRIPT -->
<script src="app.js"></script>

</body>
</html>
