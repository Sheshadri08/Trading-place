<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury E-Commerce Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: white;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #d4af37;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav a {
            color: black;
            text-decoration: none;
            margin: 0 10px;
        }
        .hero {
            background: url('hero-image.jpg') no-repeat center center;
            height: 60vh;
            position: relative;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .product {
            background-color: #fff;
            color: #000;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: 0;
            width: 300px;
            height: 100%;
            background-color: white;
            color: black;
            display: none;
            padding: 20px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
        }
        /* Additional CSS styling */
    </style>
</head>
<body>
<header>
    <h1>Luxury E-Commerce</h1>
    <nav>
        <a href="#" onclick="filterProducts('all')">All</a>
        <a href="#" onclick="filterProducts('luxury')">Luxury</a>
        <a href="#" onclick="filterProducts('premium')">Premium</a>
        <a href="#" onclick="filterProducts('exclusive')">Exclusive</a>
        <button onclick="toggleCart()">Cart</button>
        <button onclick="toggleModal('authModal')">Login</button>
    </nav>
</header>
<section class="hero">
    <h2>Welcome to the Luxury World</h2>
</section>
<section class="product-grid">
    <div class="product">Elegant Watch - $299.99</div>
    <div class="product">Gold Necklace - $449.99</div>
    <div class="product">Premium Sunglasses - $199.99</div>
    <div class="product">Silk Scarf - $89.99</div>
    <div class="product">Diamond Ring - $1299.99</div>
    <div class="product">Luxury Bag - $899.99</div>
    <div class="product">Gold Bracelet - $349.99</div>
    <div class="product">Perfume Collection - $129.99</div>
</section>
<div class="cart-sidebar" id="cartSidebar">
    <h2>Your Cart</h2>
    <div id="cartItems"></div>
    <button onclick="checkout()">Checkout</button>
</div>
<div class="modal" id="authModal">
    <div>
        <h2>Login</h2>
        <form onsubmit="login(event)">
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <button onclick="toggleModal('authModal')">Close</button>
    </div>
</div>
<script>
    function toggleCart() {
        let cart = document.getElementById('cartSidebar');
        cart.style.display = cart.style.display === 'block' ? 'none' : 'block';
    }
    function toggleModal(modalId) {
        let modal = document.getElementById(modalId);
        modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
    }

    function checkout() {

    }
    function login(event) {
        event.preventDefault();
        // Implement login functionality
    }
    // Add local storage functionality and other interactivity
</script>
</body>
</html>
